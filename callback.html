<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticating...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0612 0%, #16082a 100%);
            color: #f0ecf5;
            font-family: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            text-align: center;
            padding: 50px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155, 89, 182, 0.2);
            border-top: 3px solid #9B59B6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 1.5rem;
            margin: 20px 0;
            letter-spacing: 1px;
        }
        p {
            color: #8870a8;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="spinner"></div>
        <h2>🔐 Authenticating...</h2>
        <p>Please wait</p>
    </div>

    <script>
        // Parse OAuth response parameters
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        const error = params.get('error');

        // Handle error
        if (error) {
            alert('Login error: ' + error);
            window.location.href = '/';
        }
        // Handle success - redirect back to main app with code
        else if (code) {
            window.location.href = '/?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state);
        }
        // Fallback
        else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
