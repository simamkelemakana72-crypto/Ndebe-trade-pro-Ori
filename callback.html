<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: #0A0618;
            color: #f0ecf5;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155,89,182,0.2);
            border-top: 3px solid #9B59B6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #8870a8; }
        .error { color: #ff3366; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>🔐 Authenticating...</h2>
        <p>Please wait</p>
        <div class="error" id="errorMsg"></div>
    </div>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const error = params.get('error');
            const errorDesc = params.get('error_description');

            if (error) {
                document.getElementById('errorMsg').textContent = '❌ ' + (errorDesc || error);
                setTimeout(() => window.location.href = '/', 3000);
                return;
            }

            if (code) {
                // Redirect to main app with the code
                window.location.href = '/?code=' + encodeURIComponent(code);
            } else {
                window.location.href = '/';
            }
        })();
    </script>
</body>
</html>
