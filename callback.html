<!DOCTYPE html>
<html>
<head><title>Redirecting...</title></head>
<body>
    <script>
        const code = new URLSearchParams(window.location.search).get('code');
        if (code) {
            window.location.href = '/?code=' + encodeURIComponent(code);
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
