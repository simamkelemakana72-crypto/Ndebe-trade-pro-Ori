<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>NDEBE Analysis Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0612 0%, #16082a 100%);
            color: #f0ecf8;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        body {
            padding: 24px 16px 60px;
        }

        /* ===== PREMIUM GLOW BACKDROP ===== */
        .glow-backdrop {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
        }

        .orb-1 {
            width: 600px; height: 600px;
            top: -200px; left: -150px;
            background: radial-gradient(circle, #7c3aed, #a855f7);
            animation: float 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px; height: 500px;
            bottom: -100px; right: -100px;
            background: radial-gradient(circle, #06f 0%, #a855f7 100%);
            animation: float-delay 24s ease-in-out infinite;
        }

        .orb-3 {
            width: 400px; height: 400px;
            top: 40%; left: 50%;
            background: radial-gradient(circle, #00d9ff 0%, #7c3aed 100%);
            opacity: 0.08;
            animation: float-slow 30s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -40px) scale(1.1); }
            66% { transform: translate(-30px, 60px) scale(0.95); }
        }

        @keyframes float-delay {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 50px) scale(0.9); }
            66% { transform: translate(60px, -30px) scale(1.05); }
        }

        @keyframes float-slow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(147, 51, 234, 0.1); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, #9333ea, #7c3aed);
            border-radius: 3px;
        }

        /* ===== CONTAINER ===== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .app-header {
            text-align: center;
            padding: 30px 0 40px;
            position: relative;
            z-index: 2;
        }

        .app-header h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #06f, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-shadow: 0 0 60px rgba(147, 51, 234, 0.3);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.6)); }
        }

        .app-header .subtitle {
            font-size: 0.85rem;
            color: #a78bfa;
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== STATUS INDICATOR ===== */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            font-size: 0.75rem;
            color: #a78bfa;
            font-family: 'Space Mono', monospace;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff1493;
            box-shadow: 0 0 8px #ff1493;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== AUTH SECTION ===== */
        .auth-section {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            background: rgba(26, 18, 40, 0.6);
            border: 1px solid rgba(155, 89, 182, 0.15);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
        }
        .auth-section .greeting {
            flex: 1;
            font-size: 0.85rem;
            color: #8870a8;
        }
        .auth-section .greeting strong {
            color: #f0ecf5;
        }
        .login-btn {
            background: linear-gradient(180deg, rgba(255, 68, 68, 0.3), rgba(255, 68, 68, 0.08));
            color: #ff4444;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.7rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover {
            background: linear-gradient(180deg, rgba(255, 68, 68, 0.5), rgba(255, 68, 68, 0.15));
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.1);
        }
        .logout-btn {
            background: rgba(255,255,255,0.05);
            color: #8870a8;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.65rem;
            cursor: pointer;
            display: none;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .balance-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        @media (max-width: 500px) {
            .balance-section {
                grid-template-columns: 1fr;
            }
        }
        .balance-card {
            background: rgba(26, 18, 40, 0.6);
            border: 1px solid rgba(155, 89, 182, 0.12);
            border-radius: 10px;
            padding: 14px 16px;
            display: none;
        }
        .balance-card.active {
            display: block;
        }
        .balance-card .label {
            font-size: 0.55rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8870a8;
        }
        .balance-card .amount {
            font-family: 'Space Mono', monospace;
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 4px;
        }
        .balance-card .amount.demo {
            color: #00FF88;
        }
        .balance-card .amount.real {
            color: #FFD700;
        }
        .balance-card .currency {
            font-size: 0.7rem;
            color: #8870a8;
        }
        .balance-card .account-type {
            font-size: 0.55rem;
            padding: 2px 10px;
            border-radius: 10px;
            display: inline-block;
            margin-top: 4px;
        }
        .balance-card .account-type.demo {
            background: rgba(0, 255, 136, 0.15);
            color: #00FF88;
        }
        .balance-card .account-type.real {
            background: rgba(255, 215, 0, 0.15);
            color: #FFD700;
        }
        .balance-card .account-id {
            font-size: 0.55rem;
            color: #665580;
            font-family: 'Space Mono', monospace;
            margin-top: 2px;
        }

        /* ===== MAIN CONTENT AREA ===== */
        .content-area {
            position: relative;
            z-index: 2;
        }

        /* ===== SCAN BUTTON ===== */
        .scan-button-container {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .scan-btn {
            padding: 18px 48px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border: 2px solid transparent;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(168, 85, 247, 0.1)) border-box;
            color: #f0ecf8;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 0 40px rgba(147, 51, 234, 0.2);
            overflow: hidden;
        }

        .scan-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, #9333ea, #a855f7, #ec4899);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .scan-btn:hover::before {
            opacity: 1;
        }

        .scan-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 60px rgba(147, 51, 234, 0.4);
        }

        .scan-btn:active {
            transform: scale(0.98);
        }

        .scan-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .scan-btn.scanning {
            animation: button-glow 0.6s ease-in-out infinite;
        }

        @keyframes button-glow {
            0%, 100% { box-shadow: 0 0 40px rgba(147, 51, 234, 0.3); }
            50% { box-shadow: 0 0 80px rgba(147, 51, 234, 0.6); }
        }

        /* ===== PROGRESS DISPLAY ===== */
        .progress-container {
            display: none;
            margin: 30px 0;
            padding: 24px;
            background: rgba(26, 18, 40, 0.5);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(20px);
        }

        .progress-container.active {
            display: block;
        }

        .progress-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #a78bfa;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .markets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .market-chip {
            padding: 12px 16px;
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
            cursor: default;
        }

        .market-chip.complete {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .market-chip-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #f0ecf8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .market-chip-count {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #a78bfa;
        }

        .market-chip.complete .market-chip-count {
            color: #00ff88;
        }

        /* ===== PREDICTION BUTTONS ===== */
        .prediction-buttons {
            display: none;
            gap: 16px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .prediction-buttons.active {
            display: flex;
        }

        .pred-btn {
            flex: 1;
            min-width: 150px;
            padding: 16px 24px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.15), rgba(100, 200, 255, 0.05));
            color: #64c8ff;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.15);
            text-transform: uppercase;
        }

        .pred-btn.matches {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 255, 136, 0.05));
            color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }

        .pred-btn.differs {
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.15), rgba(255, 51, 102, 0.05));
            color: #ff3366;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.15);
        }

        .pred-btn.overunder {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(236, 72, 153, 0.05));
            color: #ec4899;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.15);
        }

        .pred-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(147, 51, 234, 0.3);
            filter: brightness(1.2);
        }

        .pred-btn:active {
            transform: scale(0.98);
        }

        /* ===== SIGNAL OVERLAY ===== */
        .signal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(10, 6, 18, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .signal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* ===== LOADING ANIMATION ===== */
        .loading-animation {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        .loading-animation.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .gears-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            height: 120px;
            margin-bottom: 30px;
        }

        .gear {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .gear svg {
            width: 100%;
            height: 100%;
        }

        @keyframes gear-pop {
            0% { 
                opacity: 0;
                transform: scale(0) rotateZ(-180deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateZ(0deg);
            }
        }

        @keyframes gear-spin {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(360deg); }
        }

        .gear:nth-child(1) { animation: gear-pop 0.6s ease-out 0s forwards, gear-spin 4s linear 0.6s infinite; }
        .gear:nth-child(2) { animation: gear-pop 0.6s ease-out 0.15s forwards, gear-spin 4s linear 0.75s infinite reverse; }
        .gear:nth-child(3) { animation: gear-pop 0.6s ease-out 0.3s forwards, gear-spin 4s linear 0.9s infinite; }
        .gear:nth-child(4) { animation: gear-pop 0.6s ease-out 0.45s forwards, gear-spin 4s linear 1.05s infinite reverse; }
        .gear:nth-child(5) { animation: gear-pop 0.6s ease-out 0.6s forwards, gear-spin 4s linear 1.2s infinite; }

        .loading-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #a78bfa;
            text-align: center;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .scanning-markets-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: #7c3aed;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== SIGNAL CARD (REVEALED) ===== */
        .signal-card {
            position: absolute;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(147, 51, 234, 0.4);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(30px);
            box-shadow: 0 0 80px rgba(147, 51, 234, 0.3), 0 0 120px rgba(168, 85, 247, 0.2);
            text-align: center;
            opacity: 0;
            transform: scale(0.5) rotateY(-90deg);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            perspective: 1000px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .signal-card.reveal {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
        }

        .signal-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #a78bfa;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .signal-digit {
            font-family: 'Space Mono', monospace;
            font-size: 4.5rem;
            font-weight: 700;
            margin: 20px 0;
            text-shadow: 0 0 40px currentColor;
            animation: digit-glow 2s ease-in-out infinite;
        }

        @keyframes digit-glow {
            0%, 100% { filter: drop-shadow(0 0 10px currentColor); }
            50% { filter: drop-shadow(0 0 30px currentColor); }
        }

        .signal-digit.matches-color { color: #00ff88; }
        .signal-digit.differs-color { color: #ff3366; }
        .signal-digit.overunder-color { color: #ec4899; }

        .signal-market {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: #f0ecf8;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .signal-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
        }

        .signal-stat {
            padding: 12px;
            background: rgba(147, 51, 234, 0.08);
            border-radius: 10px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }

        .signal-stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: #a78bfa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .signal-stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: #f0ecf8;
            font-weight: 700;
            margin-top: 4px;
        }

        .signal-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 14px;
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #00ff88;
            letter-spacing: 1px;
        }

        .signal-badge.caution {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            color: #ffd700;
        }

        .signal-badge.warning {
            background: rgba(255, 51, 102, 0.15);
            border-color: rgba(255, 51, 102, 0.4);
            color: #ff3366;
        }

        .quality-checks {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            font-size: 0.75rem;
            text-align: left;
            color: #a78bfa;
        }

        .quality-check-item {
            margin: 4px 0;
            font-family: 'Space Mono', monospace;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-header h1 { font-size: 2rem; }
            .signal-digit { font-size: 3.5rem; }
            .signal-card { padding: 30px; }
            .markets-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
        }

        @media (max-width: 480px) {
            body { padding: 16px 12px 40px; }
            .app-header h1 { font-size: 1.6rem; }
            .scan-btn { padding: 14px 32px; font-size: 0.9rem; }
            .signal-digit { font-size: 2.8rem; }
            .signal-card { padding: 20px; }
            .markets-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- ===== GLOW BACKDROP ===== -->
<div class="glow-backdrop">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
</div>

<!-- ===== SIGNAL OVERLAY ===== -->
<div class="signal-overlay" id="signalOverlay">
    <div class="loading-animation" id="loadingAnimation">
        <div class="gears-container" id="gearsContainer"></div>
        <div class="loading-text">ANALYZING MARKETS</div>
        <div class="scanning-markets-text">Computing statistical engines...</div>
    </div>
    <div class="signal-card" id="signalCard">
        <div class="signal-title" id="signalTitle">Signal</div>
        <div class="signal-digit" id="signalDigit">—</div>
        <div class="signal-market" id="signalMarket">—</div>
        <div class="signal-stats" id="signalStats"></div>
        <div class="quality-checks" id="qualityChecks"></div>
        <div class="signal-badge" id="signalBadge">Clean</div>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="app-container">
    <!-- HEADER -->
    <header class="app-header">
        <h1>NDEBE</h1>
        <div class="subtitle">Statistical Engine Suite</div>
        <div class="status-bar">
            <span class="status-dot connected" id="statusDot"></span>
            <span id="statusText">Initialized</span>
        </div>
    </header>

    <!-- CONTENT -->
    <div class="content-area">
        <!-- AUTH SECTION -->
        <div class="auth-section">
            <div class="greeting">
                <span id="userDisplay">🔒 Not logged in</span>
            </div>
            <button class="login-btn" id="loginBtn" onclick="loginWithDeriv()">LOGIN WITH DERIV</button>
            <button class="logout-btn" id="logoutBtn" onclick="logout()">LOGOUT</button>
        </div>

        <!-- BALANCE SECTION -->
        <div class="balance-section" id="balanceSection">
            <div class="balance-card" id="demoBalance">
                <div class="label">💰 Demo Account</div>
                <div class="amount demo" id="demoAmount">—</div>
                <div class="currency" id="demoCurrency">USD</div>
                <span class="account-type demo">DEMO</span>
                <div class="account-id" id="demoId">—</div>
            </div>
            <div class="balance-card" id="realBalance">
                <div class="label">💳 Real Account</div>
                <div class="amount real" id="realAmount">—</div>

    'R_10': 3, 'R_25': 3, 'R_50': 4, 'R_75': 4, 'R_100': 2,

function getLastDigit(price, decimals) {
    const priceStr = price.toFixed(decimals);
    return parseInt(priceStr.slice(-1), 10);
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

function normalCDF(z) {
    const a1 = 0.254829592;
    const a2 = -0.284496736;
    const a3 = 1.421413741;
    const a4 = -1.453152027;
    const a5 = 1.061405429;
    const p = 0.3275911;
    const sign = z < 0 ? -1 : 1;
    z = Math.abs(z) / Math.sqrt(2);
    const t = 1.0 / (1.0 + p * z);
    const y = 1.0 - (((((a5 * t + a4) * t + a3) * t + a2) * t + a1) * t * Math.exp(-z * z));
    return 0.5 * (1.0 + sign * y);
}

function bonferroniCriticalZ(alpha, numTests) {
    const correctedAlpha = alpha / numTests;
    let z = 1.96;
    while (normalCDF(z) < 1 - correctedAlpha / 2) {
        z += 0.01;
    }
    return z;
}

function connectWebSocket() {
    statusText.textContent = 'Connecting...';
    statusDot.style.background = '#ffa500';
    statusDot.style.boxShadow = '0 0 8px #ffa500';

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        statusText.textContent = 'Connected';
        statusDot.style.background = '#00ff88';
        statusDot.style.boxShadow = '0 0 12px #00ff88';
        console.log('✅ Connected to DERIV WS');
    };

    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            handleMessage(data);
        } catch (e) {}
    };

    ws.onerror = () => {
        statusText.textContent = 'Error';
        statusDot.style.background = '#ff1493';
    };

    ws.onclose = () => {
        statusText.textContent = 'Disconnected';
        statusDot.style.background = '#ff1493';
        setTimeout(connectWebSocket, 5000);
    };

    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ ping: Date.now() }));
        }
    }, 30000);
}

function handleMessage(data) {
    if (data.msg_type === 'ticks_history' && data.ticks) {
        const symbol = data.ticks_history;
        const ticks = data.ticks.map(t => t.quote || t.price);
        if (marketData[symbol]) {
            marketData[symbol].buffer = ticks.slice(-BUFFER_SIZE);
            updateMarketChip(symbol);
        }
    }

    if (data.msg_type === 'tick' && data.tick) {
        const symbol = data.tick.symbol;
        const price = data.tick.quote;
        if (marketData[symbol]) {
            marketData[symbol].buffer.push(price);
            if (marketData[symbol].buffer.length > BUFFER_SIZE) {
                marketData[symbol].buffer.shift();
            }
            updateMarketChip(symbol);
        }
    }
}

function updateMarketChip(symbol) {
    const data = marketData[symbol];
    const chip = document.getElementById(`chip-${symbol}`);
    if (!chip) return;

    const bufferCount = data.buffer.length;
    const isComplete = bufferCount >= EARLY_READ_SIZE;

    chip.innerHTML = `<div class="market-chip-name">${symbol}</div><div class="market-chip-count">${bufferCount}/${EARLY_READ_SIZE}</div>`;

    if (isComplete) {
        chip.classList.add('complete');
    } else {
        chip.classList.remove('complete');
    }
}

async function scanAllMarkets() {
    if (isScanning) return;

    isScanning = true;
    scanComplete = false;
    scanBtn.disabled = true;
    scanBtn.classList.add('scanning');
    scanBtn.textContent = 'SCANNING...';

    MARKETS.forEach(symbol => {
        marketData[symbol] = { buffer: [] };
    });

    progressContainer.classList.add('active');
    marketsGrid.innerHTML = MARKETS.map(symbol => 
        `<div class="market-chip" id="chip-${symbol}"><div class="market-chip-name">${symbol}</div><div class="market-chip-count">0/${EARLY_READ_SIZE}</div></div>`
    ).join('');

    MARKETS.forEach(symbol => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                ticks_history: symbol,
                adjust_limit: 1,
                end: 'latest',
                count: BUFFER_SIZE,
                style: 'ticks'
            }));
            ws.send(JSON.stringify({
                ticks: symbol,
                subscribe: 1
            }));
        }
    });

    let allReady = false;
    let timeout = Date.now() + 120000;

    while (!allReady && Date.now() < timeout) {
        allReady = MARKETS.every(symbol => marketData[symbol]?.buffer.length >= EARLY_READ_SIZE);
        await sleep(500);
    }

    scanComplete = true;
    isScanning = false;
    scanBtn.classList.remove('scanning');
    scanBtn.disabled = false;
    scanBtn.textContent = '✓ GATHERING COMPLETE';

    predictionButtons.classList.add('active');
}

function analyzeMatchesDiffers(symbol) {
    const data = marketData[symbol];
    if (!data || data.buffer.length === 0) return null;

    const decimals = DECIMALS[symbol];
    const digits = data.buffer.map(p => getLastDigit(p, decimals));
    const n = digits.length;

    const counts = Array(10).fill(0);
    digits.forEach(d => counts[d]++);

    const expected = n / 10;
    let chiSquare = 0;
    counts.forEach(count => {
        chiSquare += ((count - expected) ** 2) / expected;
    });

    return { symbol, n, counts, chiSquare, digits };
}

function analyzeOverUnder(symbol) {
    const data = marketData[symbol];
    if (!data || data.buffer.length === 0) return null;

    const decimals = DECIMALS[symbol];
    const digits = data.buffer.map(p => getLastDigit(p, decimals));
    const n = digits.length;

    const barriers = [2, 3, 4, 5, 6, 7];
    const results = [];

    barriers.forEach(barrier => {
        const underCount = digits.filter(d => d < barrier).length;
        const observed_pct = underCount / n;
        const baseline_pct = barrier / 10;
        const se = Math.sqrt((baseline_pct * (1 - baseline_pct)) / n);
        const z = (observed_pct - baseline_pct) / (se || 0.001);

        results.push({
            barrier,
            underCount,
            observed_pct,
            baseline_pct,
            z,
            abs_z: Math.abs(z)
        });
    });

    return { symbol, n, digits, barriers: results };
}

function analyzeDataQuality(analysisData) {
    const { digits, symbol, n } = analysisData;

    let runs = 1;
    for (let i = 1; i < digits.length; i++) {
        if (digits[i] !== digits[i - 1]) runs++;
    }

    const evenCount = digits.filter(d => d % 2 === 0).length;
    const oddCount = n - evenCount;
    const runsExpected = (2 * evenCount * oddCount) / n + 1;
    const runsSD = Math.sqrt((2 * evenCount * oddCount * (2 * evenCount * oddCount - n)) / (n ** 2 * (n - 1)));
    const runsZ = (runs - runsExpected) / (runsSD || 0.001);

    let sumProduct = 0;
    let sumSquares = 0;
    const meanDigit = digits.reduce((a, b) => a + b, 0) / n;

    for (let i = 0; i < n - 1; i++) {
        sumProduct += (digits[i] - meanDigit) * (digits[i + 1] - meanDigit);
        sumSquares += (digits[i] - meanDigit) ** 2;
    }

    const acf = sumProduct / (sumSquares || 1);

    const freq = {};
    digits.forEach(d => {
        freq[d] = (freq[d] || 0) + 1;
    });

    let entropy = 0;
    Object.values(freq).forEach(count => {
        const p = count / n;
        if (p > 0) entropy -= p * Math.log2(p);
    });

    return {
        runsTest: { runs, expected: runsExpected.toFixed(1), z: runsZ.toFixed(3) },
        autocorrelation: { lag1: acf.toFixed(4), status: Math.abs(acf) < 0.15 ? '✓ Low' : '⚠ High' },
        entropy: { value: entropy.toFixed(3), maxPossible: '3.322', ratio: (entropy / 3.322).toFixed(2) }
    };
}

async function generateSignal(engineType) {
    if (!scanComplete) {
        alert('Scan not complete yet');
        return;
    }

    signalOverlay.classList.add('active');
    loadingAnimation.classList.remove('fade-out');
    signalCard.classList.remove('reveal');

    await sleep(3000);

    let topSignal = null;

    if (engineType === 'matches') {
        for (const symbol of MARKETS) {
            const analysis = analyzeMatchesDiffers(symbol);
            if (!analysis) continue;
            if (analysis.chiSquare > 16.92) {
                topSignal = { type: 'matches', analysis, engine: 'CHI-SQUARE' };
                break;
            }
        }
    } else if (engineType === 'differs') {
        for (const symbol of MARKETS) {
            const analysis = analyzeMatchesDiffers(symbol);
            if (!analysis) continue;
            if (analysis.chiSquare > 15) {
                topSignal = { type: 'differs', analysis, engine: 'DISTRIBUTION' };
                break;
            }
        }
    } else if (engineType === 'overunder') {
        for (const symbol of MARKETS) {
            const analysis = analyzeOverUnder(symbol);
            if (!analysis) continue;
            const bestBarrier = analysis.barriers.reduce((max, b) => b.abs_z > max.abs_z ? b : max);
            if (bestBarrier.abs_z > 1.96) {
                topSignal = { type: 'overunder', analysis, barrier: bestBarrier, engine: 'BARRIER TEST' };
                break;
            }
        }
    }

    if (topSignal) {
        renderSignal(topSignal);
    } else {
        renderNoSignal();
    }
}

function renderSignal(signal) {
    const { analysis } = signal;
    const symbol = analysis.symbol;
    const nextPredicted = analysis.digits[analysis.digits.length - 1];

    document.getElementById('signalTitle').textContent = `${signal.engine} SIGNAL`;

    if (signal.type === 'matches') {
        document.getElementById('signalDigit').classList.remove('differs-color', 'overunder-color');
        document.getElementById('signalDigit').classList.add('matches-color');
        document.getElementById('signalDigit').textContent = nextPredicted;
    } else if (signal.type === 'differs') {
        document.getElementById('signalDigit').classList.remove('matches-color', 'overunder-color');
        document.getElementById('signalDigit').classList.add('differs-color');
        document.getElementById('signalDigit').textContent = (10 - nextPredicted) % 10;
    } else if (signal.type === 'overunder') {
        document.getElementById('signalDigit').classList.remove('matches-color', 'differs-color');
        document.getElementById('signalDigit').classList.add('overunder-color');
        document.getElementById('signalDigit').textContent = signal.barrier.barrier;
    }

    document.getElementById('signalMarket').textContent = symbol;

    let statsHTML = '';
    if (signal.type === 'matches') {
        statsHTML = `<div class="signal-stat"><div class="signal-stat-label">Chi-Square</div><div class="signal-stat-value">${analysis.chiSquare.toFixed(2)}</div></div><div class="signal-stat"><div class="signal-stat-label">Sample Size</div><div class="signal-stat-value">${analysis.n}</div></div>`;
    } else if (signal.type === 'overunder') {
        statsHTML = `<div class="signal-stat"><div class="signal-stat-label">Z-Score</div><div class="signal-stat-value">${signal.barrier.z.toFixed(3)}</div></div><div class="signal-stat"><div class="signal-stat-label">Observed %</div><div class="signal-stat-value">${(signal.barrier.observed_pct * 100).toFixed(1)}%</div></div>`;
    }

    document.getElementById('signalStats').innerHTML = statsHTML;

    const qualityChecks = analyzeDataQuality(analysis);
    const checksHTML = `<div class="quality-check-item">🔄 Runs: ${qualityChecks.runsTest.runs} (expected ${qualityChecks.runsTest.expected}, z=${qualityChecks.runsTest.z})</div><div class="quality-check-item">📊 Entropy: ${qualityChecks.entropy.value}/${qualityChecks.entropy.maxPossible} (ratio: ${qualityChecks.entropy.ratio})</div><div class="quality-check-item">🔗 Autocorr: ${qualityChecks.autocorrelation.lag1} ${qualityChecks.autocorrelation.status}</div>`;

    document.getElementById('qualityChecks').innerHTML = checksHTML;
    document.getElementById('signalBadge').textContent = '✓ Clean Signal';
    document.getElementById('signalBadge').classList.remove('caution', 'warning');

    loadingAnimation.classList.add('fade-out');
    setTimeout(() => signalCard.classList.add('reveal'), 300);
}

function renderNoSignal() {
    document.getElementById('signalTitle').textContent = 'NO SIGNAL';
    document.getElementById('signalDigit').classList.remove('matches-color', 'differs-color', 'overunder-color');
    document.getElementById('signalDigit').textContent = '—';
    document.getElementById('signalMarket').textContent = 'Market data inconclusive';
    document.getElementById('signalStats').innerHTML = '<div style="grid-column:1/-1;color:#a78bfa;padding:20px;text-align:center;">Try again with more data</div>';
    document.getElementById('signalBadge').textContent = 'No Clear Pattern';
    document.getElementById('signalBadge').classList.add('caution');

    loadingAnimation.classList.add('fade-out');
    setTimeout(() => signalCard.classList.add('reveal'), 300);
}

function closeSignal() {
    signalOverlay.classList.remove('active');
    loadingAnimation.classList.remove('fade-out');
    signalCard.classList.remove('reveal');
}
