<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>NDEBE Analysis Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ===== RESET & BASE ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html, body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0612 0%, #16082a 100%);
            color: #f0ecf8;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        body {
            padding: 24px 16px 60px;
        }

        /* ===== PREMIUM GLOW BACKDROP ===== */
        .glow-backdrop {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .glow-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
        }

        .orb-1 {
            width: 600px; height: 600px;
            top: -200px; left: -150px;
            background: radial-gradient(circle, #7c3aed, #a855f7);
            animation: float 20s ease-in-out infinite;
        }

        .orb-2 {
            width: 500px; height: 500px;
            bottom: -100px; right: -100px;
            background: radial-gradient(circle, #06f 0%, #a855f7 100%);
            animation: float-delay 24s ease-in-out infinite;
        }

        .orb-3 {
            width: 400px; height: 400px;
            top: 40%; left: 50%;
            background: radial-gradient(circle, #00d9ff 0%, #7c3aed 100%);
            opacity: 0.08;
            animation: float-slow 30s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(50px, -40px) scale(1.1); }
            66% { transform: translate(-30px, 60px) scale(0.95); }
        }

        @keyframes float-delay {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(-40px, 50px) scale(0.9); }
            66% { transform: translate(60px, -30px) scale(1.05); }
        }

        @keyframes float-slow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(147, 51, 234, 0.1); }
        ::-webkit-scrollbar-thumb { 
            background: linear-gradient(180deg, #9333ea, #7c3aed);
            border-radius: 3px;
        }

        /* ===== CONTAINER ===== */
        .app-container {
            position: relative;
            z-index: 1;
            max-width: 1000px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        .app-header {
            text-align: center;
            padding: 30px 0 40px;
            position: relative;
            z-index: 2;
        }

        .app-header h1 {
            font-family: 'Orbitron', monospace;
            font-weight: 900;
            font-size: 2.8rem;
            background: linear-gradient(135deg, #06f, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-shadow: 0 0 60px rgba(147, 51, 234, 0.3);
            animation: glow-pulse 3s ease-in-out infinite;
        }

        @keyframes glow-pulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(147, 51, 234, 0.3)); }
            50% { filter: drop-shadow(0 0 40px rgba(147, 51, 234, 0.6)); }
        }

        .app-header .subtitle {
            font-size: 0.85rem;
            color: #a78bfa;
            margin-top: 8px;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* ===== STATUS INDICATOR ===== */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 16px;
            font-size: 0.75rem;
            color: #a78bfa;
            font-family: 'Space Mono', monospace;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff1493;
            box-shadow: 0 0 8px #ff1493;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 12px #00ff88;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ===== MAIN CONTENT AREA ===== */
        .content-area {
            position: relative;
            z-index: 2;
        }

        /* ===== SCAN BUTTON ===== */
        .scan-button-container {
            display: flex;
            justify-content: center;
            margin: 40px 0;
        }

        .scan-btn {
            padding: 18px 48px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
            border: 2px solid transparent;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(168, 85, 247, 0.1)) border-box;
            color: #f0ecf8;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 0 40px rgba(147, 51, 234, 0.2);
            overflow: hidden;
        }

        .scan-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 16px;
            padding: 2px;
            background: linear-gradient(135deg, #9333ea, #a855f7, #ec4899);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .scan-btn:hover::before {
            opacity: 1;
        }

        .scan-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 60px rgba(147, 51, 234, 0.4);
        }

        .scan-btn:active {
            transform: scale(0.98);
        }

        .scan-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .scan-btn.scanning {
            animation: button-glow 0.6s ease-in-out infinite;
        }

        @keyframes button-glow {
            0%, 100% { box-shadow: 0 0 40px rgba(147, 51, 234, 0.3); }
            50% { box-shadow: 0 0 80px rgba(147, 51, 234, 0.6); }
        }

        /* ===== PROGRESS DISPLAY ===== */
        .progress-container {
            display: none;
            margin: 30px 0;
            padding: 24px;
            background: rgba(26, 18, 40, 0.5);
            border: 1px solid rgba(147, 51, 234, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(20px);
        }

        .progress-container.active {
            display: block;
        }

        .progress-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #a78bfa;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .markets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .market-chip {
            padding: 12px 16px;
            background: rgba(147, 51, 234, 0.1);
            border: 1px solid rgba(147, 51, 234, 0.3);
            border-radius: 12px;
            text-align: center;
            transition: all 0.3s;
            cursor: default;
        }

        .market-chip.complete {
            background: rgba(0, 255, 136, 0.1);
            border-color: rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.2);
        }

        .market-chip-name {
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            color: #f0ecf8;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .market-chip-count {
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #a78bfa;
        }

        .market-chip.complete .market-chip-count {
            color: #00ff88;
        }

        /* ===== PREDICTION BUTTONS ===== */
        .prediction-buttons {
            display: none;
            gap: 16px;
            margin-top: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .prediction-buttons.active {
            display: flex;
        }

        .pred-btn {
            flex: 1;
            min-width: 150px;
            padding: 16px 24px;
            font-family: 'Orbitron', monospace;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 1px;
            border: 2px solid transparent;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(100, 200, 255, 0.15), rgba(100, 200, 255, 0.05));
            color: #64c8ff;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 0 30px rgba(100, 200, 255, 0.15);
            text-transform: uppercase;
        }

        .pred-btn.matches {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15), rgba(0, 255, 136, 0.05));
            color: #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }

        .pred-btn.differs {
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.15), rgba(255, 51, 102, 0.05));
            color: #ff3366;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.15);
        }

        .pred-btn.overunder {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.15), rgba(236, 72, 153, 0.05));
            color: #ec4899;
            box-shadow: 0 0 30px rgba(236, 72, 153, 0.15);
        }

        .pred-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(147, 51, 234, 0.3);
            filter: brightness(1.2);
        }

        .pred-btn:active {
            transform: scale(0.98);
        }

        /* ===== SIGNAL OVERLAY ===== */
        .signal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(10, 6, 18, 0.85);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .signal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* ===== LOADING ANIMATION ===== */
        .loading-animation {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            opacity: 1;
            transition: opacity 0.6s ease;
        }

        .loading-animation.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        .gears-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 30px;
            height: 120px;
            margin-bottom: 30px;
        }

        .gear {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
        }

        .gear svg {
            width: 100%;
            height: 100%;
        }

        @keyframes gear-pop {
            0% { 
                opacity: 0;
                transform: scale(0) rotateZ(-180deg);
            }
            60% {
                opacity: 1;
                transform: scale(1.1);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotateZ(0deg);
            }
        }

        @keyframes gear-spin {
            0% { transform: rotateZ(0deg); }
            100% { transform: rotateZ(360deg); }
        }

        .gear:nth-child(1) { animation: gear-pop 0.6s ease-out 0s forwards, gear-spin 4s linear 0.6s infinite; }
        .gear:nth-child(2) { animation: gear-pop 0.6s ease-out 0.15s forwards, gear-spin 4s linear 0.75s infinite reverse; }
        .gear:nth-child(3) { animation: gear-pop 0.6s ease-out 0.3s forwards, gear-spin 4s linear 0.9s infinite; }
        .gear:nth-child(4) { animation: gear-pop 0.6s ease-out 0.45s forwards, gear-spin 4s linear 1.05s infinite reverse; }
        .gear:nth-child(5) { animation: gear-pop 0.6s ease-out 0.6s forwards, gear-spin 4s linear 1.2s infinite; }

        .loading-text {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #a78bfa;
            text-align: center;
            margin-top: 20px;
            text-transform: uppercase;
        }

        .scanning-markets-text {
            font-family: 'Space Mono', monospace;
            font-size: 0.8rem;
            color: #7c3aed;
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* ===== SIGNAL CARD (REVEALED) ===== */
        .signal-card {
            position: absolute;
            background: linear-gradient(135deg, rgba(147, 51, 234, 0.2), rgba(168, 85, 247, 0.1));
            border: 1px solid rgba(147, 51, 234, 0.4);
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 90%;
            backdrop-filter: blur(30px);
            box-shadow: 0 0 80px rgba(147, 51, 234, 0.3), 0 0 120px rgba(168, 85, 247, 0.2);
            text-align: center;
            opacity: 0;
            transform: scale(0.5) rotateY(-90deg);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            perspective: 1000px;
            overflow-y: auto;
            max-height: 80vh;
        }

        .signal-card.reveal {
            opacity: 1;
            transform: scale(1) rotateY(0deg);
        }

        .signal-title {
            font-family: 'Orbitron', monospace;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #a78bfa;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .signal-digit {
            font-family: 'Space Mono', monospace;
            font-size: 4.5rem;
            font-weight: 700;
            margin: 20px 0;
            text-shadow: 0 0 40px currentColor;
            animation: digit-glow 2s ease-in-out infinite;
        }

        @keyframes digit-glow {
            0%, 100% { filter: drop-shadow(0 0 10px currentColor); }
            50% { filter: drop-shadow(0 0 30px currentColor); }
        }

        .signal-digit.matches-color { color: #00ff88; }
        .signal-digit.differs-color { color: #ff3366; }
        .signal-digit.overunder-color { color: #ec4899; }

        .signal-market {
            font-family: 'Space Mono', monospace;
            font-size: 0.85rem;
            color: #f0ecf8;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .signal-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
        }

        .signal-stat {
            padding: 12px;
            background: rgba(147, 51, 234, 0.08);
            border-radius: 10px;
            border: 1px solid rgba(147, 51, 234, 0.2);
        }

        .signal-stat-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.65rem;
            color: #a78bfa;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .signal-stat-value {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
            color: #f0ecf8;
            font-weight: 700;
            margin-top: 4px;
        }

        .signal-badge {
            display: inline-block;
            margin-top: 16px;
            padding: 6px 14px;
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.4);
            border-radius: 20px;
            font-family: 'Space Mono', monospace;
            font-size: 0.7rem;
            color: #00ff88;
            letter-spacing: 1px;
        }

        .signal-badge.caution {
            background: rgba(255, 215, 0, 0.15);
            border-color: rgba(255, 215, 0, 0.4);
            color: #ffd700;
        }

        .signal-badge.warning {
            background: rgba(255, 51, 102, 0.15);
            border-color: rgba(255, 51, 102, 0.4);
            color: #ff3366;
        }

        .quality-checks {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(147, 51, 234, 0.2);
            font-size: 0.75rem;
            text-align: left;
            color: #a78bfa;
        }

        .quality-check-item {
            margin: 4px 0;
            font-family: 'Space Mono', monospace;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .app-header h1 { font-size: 2rem; }
            .signal-digit { font-size: 3.5rem; }
            .signal-card { padding: 30px; }
            .markets-grid { grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); }
        }

        @media (max-width: 480px) {
            body { padding: 16px 12px 40px; }
            .app-header h1 { font-size: 1.6rem; }
            .scan-btn { padding: 14px 32px; font-size: 0.9rem; }
            .signal-digit { font-size: 2.8rem; }
            .signal-card { padding: 20px; }
            .markets-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- ===== GLOW BACKDROP ===== -->
<div class="glow-backdrop">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>
</div>

<!-- ===== SIGNAL OVERLAY ===== -->
<div class="signal-overlay" id="signalOverlay">
    <div class="loading-animation" id="loadingAnimation">
        <div class="gears-container" id="gearsContainer"></div>
        <div class="loading-text">ANALYZING MARKETS</div>
        <div class="scanning-markets-text">Computing statistical engines...</div>
    </div>
    <div class="signal-card" id="signalCard">
        <div class="signal-title" id="signalTitle">Signal</div>
        <div class="signal-digit" id="signalDigit">—</div>
        <div class="signal-market" id="signalMarket">—</div>
        <div class="signal-stats" id="signalStats"></div>
        <div class="quality-checks" id="qualityChecks"></div>
        <div class="signal-badge" id="signalBadge">Clean</div>
    </div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="app-container">
    <!-- HEADER -->
    <header class="app-header">
        <h1>NDEBE</h1>
        <div class="subtitle">Statistical Engine Suite</div>
        <div class="status-bar">
            <span class="status-dot connected" id="statusDot"></span>
            <span id="statusText">Initialized</span>

    <!-- CONTENT -->
    <div class="content-area">
        <!-- SCAN BUTTON -->
        <div class="scan-button-container">
            <button class="scan-btn" id="scanBtn">⟳ SCAN ALL MARKETS</button>
        </div>

        <!-- PROGRESS DISPLAY -->
        <div class="progress-container" id="progressContainer">
            <div class="progress-title">🔄 Gathering 30 Ticks (Into 200-Tick Buffer)</div>

        <!-- PREDICTION BUTTONS -->
        <div class="prediction-buttons" id="predictionButtons">
            <button class="pred-btn matches" id="matchesBtn">🎯 MATCHES</button>
            <button class="pred-btn differs" id="differsBtn">⚡ DIFFERS</button>
            <button class="pred-btn overunder" id="overunderBtn">📊 OVER/UNDER</button>
        </div>
    </div>

<!-- ===== JAVASCRIPT - PURE ENGINE IMPLEMENTATION ===== -->
<script>
// ============================================================
// NDEBE STATISTICAL ENGINE - CORE LOGIC ONLY
// ============================================================

// ===== CONFIG =====
const MARKETS = ['R_10', 'R_25', 'R_50', 'R_75', 'R_100', '1HZ10V', '1HZ25V', '1HZ50V', '1HZ75V', '1HZ100V', 'JD10', 'JD25'];
const DECIMALS = {
    'R_10': 3, 'R_25': 3, 'R_50': 4, 'R_75': 4, 'R_100': 2,
    '1HZ10V': 2, '1HZ25V': 2, '1HZ50V': 2, '1HZ75V': 2, '1HZ100V': 2,
    'JD10': 2, 'JD25': 2
};
const BUFFER_SIZE = 200;
const EARLY_READ_SIZE = 30;
const WS_URL = 'wss://ws.derivws.com/websockets/v3?app_id=1089';

// ===== STATE =====
let ws = null;
let marketData = {};
let isScanning = false;
let scanComplete = false;

// ===== DOM REFS =====
const scanBtn = document.getElementById('scanBtn');
const progressContainer = document.getElementById('progressContainer');
const marketsGrid = document.getElementById('marketsGrid');
const predictionButtons = document.getElementById('predictionButtons');
const matchesBtn = document.getElementById('matchesBtn');
const differsBtn = document.getElementById('differsBtn');
const overunderBtn = document.getElementById('overunderBtn');
const signalOverlay = document.getElementById('signalOverlay');
const loadingAnimation = document.getElementById('loadingAnimation');
const signalCard = document.getElementById('signalCard');
const gearsContainer = document.getElementById('gearsContainer');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

// ===== UTILITY: EXTRACT LAST DIGIT =====
function getLastDigit(price, decimals) {
    const priceStr = price.toFixed(decimals);
    return parseInt(priceStr.slice(-1), 10);
}

function sleep(ms) {
    return new Promise(r => setTimeout(r, ms));
}

// ===== UTILITY: NORMAL CDF (Q-function) =====
function normalCDF(z) {
    const a1 = 0.254829592;
    const a2 = -0.284496736;
    const a3 = 1.421413741;
    const a4 = -1.453152027;
    const a5 = 1.061405429;
    const p = 0.3275911;
    const sign = z < 0 ? -1 : 1;
    z = Math.abs(z) / Math.sqrt(2);
    const t = 1.0 / (1.0 + p * z);
    const y = 1.0 - (((((a5 * t + a4) * t + a3) * t + a2) * t + a1) * t * Math.exp(-z * z));
    return 0.5 * (1.0 + sign * y);
}

// ===== BONFERRONI CORRECTION =====
function bonferroniCriticalZ(alpha, numTests) {
    const correctedAlpha = alpha / numTests;
    let z = 1.96; // Start with 95% CL
    while (normalCDF(z) < 1 - correctedAlpha / 2) {
        z += 0.01;
    }
    return z;
}

// ===== GEARS SVG GENERATOR =====
function generateGearSVG() {
    return `
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="gearGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#9333ea;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
                </linearGradient>
            </defs>
            <circle cx="50" cy="50" r="35" fill="url(#gearGrad)" opacity="0.3"/>

// ===== WEBSOCKET CONNECTION =====
function connectWebSocket() {
    statusText.textContent = 'Connecting...';
    statusDot.style.background = '#ffa500';
    statusDot.style.boxShadow = '0 0 8px #ffa500';

    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
        statusText.textContent = 'Connected';
        statusDot.style.background = '#00ff88';
        statusDot.style.boxShadow = '0 0 12px #00ff88';
        console.log('✅ Connected to DERIV WS');
    };

    ws.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            handleMessage(data);
        } catch (e) {
            // Ignore parse errors
        }
    };

    ws.onerror = () => {
        statusText.textContent = 'Error';
        statusDot.style.background = '#ff1493';
    };

    ws.onclose = () => {
        statusText.textContent = 'Disconnected';
        statusDot.style.background = '#ff1493';
        setTimeout(connectWebSocket, 5000);
    };

    setInterval(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ ping: Date.now() }));
        }
    }, 30000);
}

// ===== MESSAGE HANDLER =====
function handleMessage(data) {
    if (data.msg_type === 'ticks_history' && data.ticks) {
        const symbol = data.ticks_history;
        const ticks = data.ticks.map(t => t.quote || t.price);
        if (marketData[symbol]) {
            // Populate buffer with history
            marketData[symbol].buffer = ticks.slice(-BUFFER_SIZE);
            updateMarketChip(symbol);
        }
    }

    if (data.msg_type === 'tick' && data.tick) {
        const symbol = data.tick.symbol;
        const price = data.tick.quote;
        if (marketData[symbol]) {
            // Push to buffer (auto-maintains last 200)
            marketData[symbol].buffer.push(price);
            if (marketData[symbol].buffer.length > BUFFER_SIZE) {
                marketData[symbol].buffer.shift();
            }
            updateMarketChip(symbol);
        }
    }
}

// ===== MARKET CHIP UPDATE =====
function updateMarketChip(symbol) {
    const data = marketData[symbol];
    const chip = document.getElementById(`chip-${symbol}`);
    if (!chip) return;

    const bufferCount = data.buffer.length;
    const isComplete = bufferCount >= EARLY_READ_SIZE;

    chip.innerHTML = `
        <div class="market-chip-name">${symbol}</div>
        <div class="market-chip-count">${bufferCount}/${EARLY_READ_SIZE}</div>
    `;

    if (isComplete) {
        chip.classList.add('complete');
    } else {
        chip.classList.remove('complete');
    }
}

// ===== SCAN ALL MARKETS =====
async function scanAllMarkets() {
    if (isScanning) return;

    isScanning = true;
    scanComplete = false;
    scanBtn.disabled = true;
    scanBtn.classList.add('scanning');
    scanBtn.textContent = 'SCANNING...';

    // Reset data
    MARKETS.forEach(symbol => {
        marketData[symbol] = { buffer: [] };
    });

    // Show progress
    progressContainer.classList.add('active');
    marketsGrid.innerHTML = MARKETS.map(symbol => 
        `<div class="market-chip" id="chip-${symbol}">
            <div class="market-chip-name">${symbol}</div>
            <div class="market-chip-count">0/${EARLY_READ_SIZE}</div>
        </div>`
    ).join('');

    // Subscribe to all markets
    MARKETS.forEach(symbol => {
        if (ws && ws.readyState === WebSocket.OPEN) {
            // Request full history (200 ticks)
            ws.send(JSON.stringify({
                ticks_history: symbol,
                adjust_limit: 1,
                end: 'latest',
                count: BUFFER_SIZE,
                style: 'ticks'
            }));
            // Subscribe to live ticks
            ws.send(JSON.stringify({
                ticks: symbol,
                subscribe: 1
            }));
        }
    });

    // Wait for all markets to gather EARLY_READ_SIZE ticks
    let allReady = false;
    let timeout = Date.now() + 120000; // 2 minute timeout

    while (!allReady && Date.now() < timeout) {
        allReady = MARKETS.every(symbol => marketData[symbol]?.buffer.length >= EARLY_READ_SIZE);
        await sleep(500);
    }

    // Scan complete
    scanComplete = true;
    isScanning = false;
    scanBtn.classList.remove('scanning');
    scanBtn.disabled = false;
    scanBtn.textContent = '✓ GATHERING COMPLETE';

    // Show prediction buttons
    predictionButtons.classList.add('active');
}

// ===== ENGINE 1: MATCHES/DIFFERS =====
function analyzeMatchesDiffers(symbol) {
    const data = marketData[symbol];
    if (!data || data.buffer.length === 0) return null;

    const decimals = DECIMALS[symbol];
    const digits = data.buffer.map(p => getLastDigit(p, decimals));
    const n = digits.length;

    // Frequency count
    const counts = Array(10).fill(0);
    digits.forEach(d => counts[d]++);

    // Chi-square
    const expected = n / 10;
    let chiSquare = 0;
    counts.forEach(count => {
        chiSquare += ((count - expected) ** 2) / expected;
    });

    return {
        symbol,
        n,
        counts,
        chiSquare,
        digits
    };
}

// ===== ENGINE 2: OVER/UNDER =====
function analyzeOverUnder(symbol) {
    const data = marketData[symbol];
    if (!data || data.buffer.length === 0) return null;

    const decimals = DECIMALS[symbol];
    const digits = data.buffer.map(p => getLastDigit(p, decimals));
    const n = digits.length;

    // Valid barriers: 2–7 only
    const barriers = [2, 3, 4, 5, 6, 7];
    const results = [];

    barriers.forEach(barrier => {
        const underCount = digits.filter(d => d < barrier).length;
        const observed_pct = underCount / n;
        const baseline_pct = barrier / 10;
        
        const se = Math.sqrt((baseline_pct * (1 - baseline_pct)) / n);
        const z = (observed_pct - baseline_pct) / (se || 0.001);

        results.push({
            barrier,
            underCount,
            observed_pct,
            baseline_pct,
            z,
            abs_z: Math.abs(z)
        });
    });

    return {
        symbol,
        n,
        digits,
        barriers: results
    };
}

// ===== ENGINE 3: DATA QUALITY LAYER =====
function analyzeDataQuality(analysisData) {
    const { digits, symbol, n } = analysisData;

    let checks = {
        runsTest: null,
        autocorrelation: null,
        entropy: null
    };

    // Runs Test (Wald-Wolfowitz) on even/odd parity
    let runsZ = null;
    {
        const parity = digits.map(d => d % 2); // 0 = even, 1 = odd
        let runs = 1;
        for (let i = 1; i < parity.length; i++) {
            if (parity[i] !== parity[i - 1]) runs++;
        }
        const n0 = parity.filter(p => p === 0).length;
        const n1 = parity.length - n0;
        const expectedRuns = (2 * n0 * n1) / (n0 + n1) + 1;
        const variance = (2 * n0 * n1 * (2 * n0 * n1 - n0 - n1)) / (((n0 + n1) ** 2) * (n0 + n1 - 1));
        runsZ = (runs - expectedRuns) / Math.sqrt(variance);
        checks.runsTest = {
            runs,
            z: runsZ,
            flagged: Math.abs(runsZ) > 1.96
        };
    }

    // Autocorrelation, lag 1–5
    let maxAutocorr = 0;
    {
        for (let lag = 1; lag <= 5; lag++) {
            let sumProd = 0;
            let sumSq1 = 0;
            let sumSq2 = 0;
            for (let i = 0; i < digits.length - lag; i++) {
                sumProd += (digits[i] - 4.5) * (digits[i + lag] - 4.5);
                sumSq1 += (digits[i] - 4.5) ** 2;
                sumSq2 += (digits[i + lag] - 4.5) ** 2;
            }
            const corr = sumProd / Math.sqrt(sumSq1 * sumSq2);
            maxAutocorr = Math.max(maxAutocorr, Math.abs(corr));
        }
        checks.autocorrelation = {
            maxCorr: maxAutocorr,
            flagged: maxAutocorr > 0.15
        };
    }

    // Shannon Entropy
    let entropy = 0;
    {
        const counts = Array(10).fill(0);
        digits.forEach(d => counts[d]++);
        counts.forEach(count => {
            if (count > 0) {
                const p = count / digits.length;
                entropy -= p * Math.log2(p);
            }
        });
        const maxEntropy = Math.log2(10);
        const entropyRatio = entropy / maxEntropy;
        checks.entropy = {
            entropy,
            ratio: entropyRatio,
            flagged: entropyRatio < 0.9
        };
    }

    // Combine into badge
    const failCount = [checks.runsTest.flagged, checks.autocorrelation.flagged, checks.entropy.flagged].filter(f => f).length;
    let badge = '🟢 Clean';
    let badgeClass = '';
    if (failCount === 1) {
        badge = '🟡 Caution';
        badgeClass = 'caution';
    } else if (failCount >= 2) {
        badge = '🔴 Clustering detected';
        badgeClass = 'warning';
    }

    return {
        checks,
        badge,
        badgeClass,
        failCount
    };
}

// ===== RUN ANALYSIS =====
async function runAnalysis(type) {
    signalOverlay.classList.add('active');
    loadingAnimation.classList.remove('fade-out');
    signalCard.classList.remove('reveal');

    await sleep(100);

    let results = [];

    if (type === 'matches') {
        MARKETS.forEach(symbol => {
            const analysis = analyzeMatchesDiffers(symbol);
            if (analysis) {
                const maxCount = Math.max(...analysis.counts);
                const digit = analysis.counts.indexOf(maxCount);
                const percentage = (maxCount / analysis.n) * 100;
                
                // Bonferroni correction for 10 digits × MARKETS.length combinations
                const numTests = 10 * MARKETS.length;
                const correctedZ = bonferroniCriticalZ(0.05, numTests);
                
                // Convert chi to z-like statistic for this digit
                const z = (maxCount - analysis.n / 10) / Math.sqrt(analysis.n / 10);
                
                const quality = analyzeDataQuality(analysis);
                
                results.push({
                    symbol,
                    digit,
                    percentage,
                    chi: analysis.chiSquare,
                    z,
                    quality,
                    sort_key: percentage
                });
            }
        });
        results.sort((a, b) => b.sort_key - a.sort_key);
    }

    if (type === 'differs') {
        MARKETS.forEach(symbol => {
            const analysis = analyzeMatchesDiffers(symbol);
            if (analysis) {
                let minDeviation = Infinity;
                let digit = 0;
                analysis.counts.forEach((count, i) => {
                    const deviation = Math.abs((count / analysis.n * 100) - 10);
                    if (deviation < minDeviation) {
                        minDeviation = deviation;
                        digit = i;
                    }
                });

                const numTests = 10 * MARKETS.length;
                const correctedZ = bonferroniCriticalZ(0.05, numTests);
                
                const quality = analyzeDataQuality(analysis);
                
                results.push({
                    symbol,
                    digit,
                    deviation: minDeviation,
                    chi: analysis.chiSquare,
                    quality,
                    sort_key: -minDeviation
                });
            }
        });
        results.sort((a, b) => b.sort_key - a.sort_key);
    }

    if (type === 'overunder') {
        MARKETS.forEach(symbol => {
            const analysis = analyzeOverUnder(symbol);
            if (analysis) {
                // Find strongest |z| across all barriers
                let strongest = analysis.barriers[0];
                analysis.barriers.forEach(b => {
                    if (b.abs_z > strongest.abs_z) {
                        strongest = b;
                    }
                });

                const quality = analyzeDataQuality(analysis);
                
                results.push({
                    symbol,
                    barrier: strongest.barrier,
                    direction: strongest.z > 0 ? 'UNDER' : 'OVER',
                    z: strongest.z,
                    abs_z: strongest.abs_z,
                    quality,
                    sort_key: strongest.abs_z
                });
            }
        });
        results.sort((a, b) => b.sort_key - a.sort_key);
    }

    // Animate loading
    await sleep(9000);

    loadingAnimation.classList.add('fade-out');
    await sleep(300);
    signalCard.classList.add('reveal');

    displaySignal(type, results[0]);
}
