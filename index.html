<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ndebe Trade Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0A0618;
            color: #f0ecf5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: #0A0618;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
            transition: opacity 0.5s;
        }
        #loginOverlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loginOverlay h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #9B59B6, #E879F9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        #loginOverlay p {
            color: #8870a8;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        #loginOverlay button {
            background: linear-gradient(180deg, rgba(255,68,68,0.4), rgba(255,68,68,0.1));
            color: #ff4444;
            border: 2px solid rgba(255,68,68,0.3);
            padding: 16px 48px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s;
        }
        #loginOverlay button:hover {
            background: linear-gradient(180deg, rgba(255,68,68,0.6), rgba(255,68,68,0.2));
            box-shadow: 0 0 40px rgba(255,68,68,0.2);
            transform: scale(1.02);
        }
        #appContent {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            padding: 20px;
            max-width: 800px;
            width: 100%;
        }
        #appContent.unlocked {
            opacity: 1;
            pointer-events: all;
        }
        .card {
            background: rgba(26, 18, 40, 0.6);
            border: 1px solid rgba(155, 89, 182, 0.15);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .balance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 500px) {
            .balance-grid { grid-template-columns: 1fr; }
        }
        .balance-card .amount {
            font-size: 2rem;
            font-weight: 700;
        }
        .balance-card .amount.demo { color: #00FF88; }
        .balance-card .amount.real { color: #FFD700; }
        .balance-card .label {
            font-size: 0.7rem;
            color: #8870a8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .user-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .user-bar .greeting { color: #8870a8; }
        .user-bar .greeting strong { color: #f0ecf5; }
        .logout-btn {
            background: rgba(255,255,255,0.05);
            color: #8870a8;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.1); }
        select, input {
            background: #1a1228;
            border: 1px solid rgba(155,89,182,0.2);
            border-radius: 6px;
            color: #f0ecf5;
            padding: 8px 12px;
            font-size: 0.9rem;
            width: 100%;
            margin-top: 4px;
        }
        select:focus, input:focus { outline: none; border-color: #9B59B6; }
        .trade-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .trade-row > * { flex: 1; min-width: 80px; }
        .trade-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        .trade-btn.buy { background: rgba(0,255,136,0.2); color: #00FF88; }
        .trade-btn.buy:hover { background: rgba(0,255,136,0.3); }
        .trade-btn.sell { background: rgba(255,51,102,0.2); color: #FF3366; }
        .trade-btn.sell:hover { background: rgba(255,51,102,0.3); }
        .trade-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        #statusText { color: #8870a8; font-size: 0.8rem; }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.connected { background: #00FF88; }
        .status-dot.disconnected { background: #FF3366; }
        .btn-main {
            background: linear-gradient(180deg, rgba(155,89,182,0.4), rgba(155,89,182,0.1));
            color: #f0ecf5;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-main:hover { background: linear-gradient(180deg, rgba(155,89,182,0.6), rgba(155,89,182,0.2)); }
        .btn-main:disabled { opacity: 0.3; cursor: not-allowed; }
        .mt-8 { margin-top: 8px; }
        .mb-8 { margin-bottom: 8px; }
        .text-center { text-align: center; }
        .text-muted { color: #8870a8; }
        .text-sm { font-size: 0.8rem; }
    </style>
</head>
<body>

<!-- ===== LOGIN OVERLAY ===== -->
<div id="loginOverlay">
    <h1>🚀 Ndebe Trade Pro</h1>
    <p>🔐 SECURE TRADING TERMINAL</p>
    <button onclick="loginWithDeriv()">LOGIN WITH DERIV</button>
    <p style="margin-top:30px;font-size:0.7rem;color:#665580;max-width:350px;text-align:center;">Connect your Deriv account to access live trading and real-time analysis</p>
</div>

<!-- ===== APP CONTENT ===== -->
<div id="appContent">

    <!-- HEADER -->
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px;">
        <h1 style="font-size:1.5rem;background:linear-gradient(135deg,#9B59B6,#E879F9);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">NDEBE TRADE PRO</h1>
        <div>
            <span class="status-dot disconnected" id="statusDot"></span>
            <span id="statusText">Disconnected</span>
        </div>
    </div>

    <!-- USER BAR -->
    <div class="card user-bar" id="userBar" style="display:none;">
        <span class="greeting">👋 Welcome, <strong id="userName">Trader</strong></span>
        <button class="logout-btn" onclick="logout()">LOGOUT</button>
    </div>

    <!-- BALANCE -->
    <div class="card" id="balanceSection" style="display:none;">
        <div class="balance-grid">
            <div class="balance-card">
                <div class="label">💰 Demo Account</div>
                <div class="amount demo" id="demoAmount">—</div>
                <div class="text-muted text-sm" id="demoCurrency">USD</div>
                <div class="text-muted text-sm" id="demoId">—</div>
            </div>
            <div class="balance-card">
                <div class="label">💰 Real Account</div>
                <div class="amount real" id="realAmount">—</div>
                <div class="text-muted text-sm" id="realCurrency">USD</div>
                <div class="text-muted text-sm" id="realId">—</div>
            </div>
        </div>
    </div>

    <!-- TRADE SECTION -->
    <div class="card" id="tradeSection" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:700;">⚡ Place Trade</span>
            <span class="text-muted text-sm" id="tradeStatus">Ready</span>
        </div>
        <div class="trade-row">
            <div>
                <label class="text-muted text-sm">Amount</label>
                <input type="number" id="tradeAmount" value="10" min="1" step="1" />
            </div>
            <div>
                <label class="text-muted text-sm">Duration</label>
                <input type="number" id="tradeDuration" value="5" min="1" step="1" />
            </div>
            <div>
                <label class="text-muted text-sm">Type</label>
                <select id="tradeType">
                    <option value="CALL">CALL (Up)</option>
                    <option value="PUT">PUT (Down)</option>
                </select>
            </div>
        </div>
        <div class="trade-row" style="margin-top:8px;">
            <button class="trade-btn buy" onclick="placeTrade('CALL')">BUY CALL</button>
            <button class="trade-btn sell" onclick="placeTrade('PUT')">BUY PUT</button>
        </div>
    </div>

    <!-- MARKET SELECT -->
    <div class="card">
        <label class="text-muted text-sm">Select Market</label>
        <select id="marketSelect">
            <option value="R_100">Volatility 100</option>
            <option value="R_75">Volatility 75</option>
            <option value="R_50">Volatility 50</option>
            <option value="R_25">Volatility 25</option>
            <option value="R_10">Volatility 10</option>
            <option value="1HZ100V">Volatility 100 (1s)</option>
            <option value="1HZ75V">Volatility 75 (1s)</option>
            <option value="1HZ50V">Volatility 50 (1s)</option>
            <option value="1HZ25V">Volatility 25 (1s)</option>
            <option value="1HZ10V">Volatility 10 (1s)</option>
            <option value="JD10">Jump 10</option>
            <option value="JD25">Jump 25</option>
        </select>
    </div>

    <!-- SCAN BUTTON -->
    <button class="btn-main" id="scanBtn" onclick="scanAllMarkets()">⟳ SCAN ALL MARKETS</button>

    <!-- LIVE PRICE -->
    <div class="card" id="livePriceSection" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span class="text-muted text-sm">Live Price</span>
            <span style="font-size:1.5rem;font-weight:700;" id="livePrice">—</span>
        </div>
        <div id="tickFeed" style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;padding-top:8px;border-top:1px solid rgba(155,89,182,0.1);"></div>
    </div>

    <!-- STATUS MESSAGE -->
    <div id="message" class="text-center text-muted text-sm" style="margin-top:16px;"></div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================
const CLIENT_ID = "33B44tAtovshdIedmNunD";
// *** FIXED: Redirect URL now ends with .html ***
const REDIRECT_URI = window.location.origin + "/callback.html";

let accessToken = null;
let ws = null;
let accountDetails = {};
let marketData = {};
let isScanning = false;

// ============================================================
// DOM REFS
// ============================================================
const loginOverlay = document.getElementById('loginOverlay');
const appContent = document.getElementById('appContent');
const userBar = document.getElementById('userBar');
const balanceSection = document.getElementById('balanceSection');
const tradeSection = document.getElementById('tradeSection');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const message = document.getElementById('message');

// ============================================================
// OAUTH FUNCTIONS
// ============================================================
function loginWithDeriv() {
    const state = Math.random().toString(36).substring(7);
    localStorage.setItem('oauth_state', state);

    const authUrl = 'https://auth.deriv.com/oauth2/auth?' +
        'response_type=code' +
        '&client_id=' + CLIENT_ID +
        '&redirect_uri=' + encodeURIComponent(REDIRECT_URI) +
        '&scope=read trade' +
        '&state=' + state;

    console.log('🔐 Redirecting to:', authUrl);
    window.location.href = authUrl;
}

function handleOAuthCallback() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');

    if (error) {
        showMessage('❌ Login error: ' + error);
        return;
    }

    if (code) {
        console.log('✅ Authorization code received');
        localStorage.setItem('auth_code', code);
        exchangeCodeForToken(code);
        // Clean URL
        window.history.replaceState({}, document.title, '/');
    }
}

async function exchangeCodeForToken(code) {
    try {
        showMessage('🔄 Exchanging code for token...');

        const response = await fetch('https://api.deriv.com/api/oauth/token', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                code: code,
                client_id: CLIENT_ID,
                redirect_uri: REDIRECT_URI
            })
        });

        const data = await response.json();

        if (data.access_token) {
            accessToken = data.access_token;
            localStorage.setItem('access_token', accessToken);
            console.log('✅ Access token obtained');
            connectWebSocket();
        } else {
            showMessage('❌ Token exchange failed: ' + JSON.stringify(data));
        }
    } catch (e) {
        showMessage('❌ Token exchange error: ' + e.message);
        console.error(e);
    }
}

// ============================================================
// WEBSOCKET
// ============================================================
function connectWebSocket() {
    showMessage('📡 Connecting to Deriv WebSocket...');
    updateStatus('Connecting...', false);

    ws = new WebSocket('wss://ws.deriv.com/websockets/v3');

    ws.onopen = function() {
        console.log('✅ WebSocket connected');
        updateStatus('Connected', true);
        showMessage('✅ Connected! Authorizing...');

        ws.send(JSON.stringify({ authorize: accessToken }));
        ws.send(JSON.stringify({ get_account_list: 1 }));
        ws.send(JSON.stringify({ get_self: 1 }));
    };

    ws.onmessage = function(event) {
        try {
            const data = JSON.parse(event.data);
            handleMessage(data);
        } catch (e) {
            console.error('Parse error:', e);
        }
    };

    ws.onerror = function(error) {
        console.error('❌ WebSocket error:', error);
        updateStatus('Error', false);
        showMessage('❌ WebSocket error');
    };

    ws.onclose = function() {
        console.log('⚠️ WebSocket disconnected');
        updateStatus('Disconnected', false);
        setTimeout(connectWebSocket, 5000);
    };

    // Keep alive
    setInterval(function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ ping: Date.now() }));
        }
    }, 30000);
}

// ============================================================
// WEBSOCKET MESSAGE HANDLER
// ============================================================
function handleMessage(data) {
    // Authorization success
    if (data.authorize) {
        console.log('✅ Authorized');
        showMessage('✅ Authorized! Fetching account details...');
    }

    // Account list
    if (data.get_account_list) {
        console.log('📋 Accounts:', data.get_account_list.accounts);
        displayAccounts(data.get_account_list.accounts);
    }

    // User info
    if (data.get_self) {
        document.getElementById('userName').textContent = data.get_self.name || 'Trader';
    }

    // Balance
    if (data.balance) {
        updateBalance(data.balance);
    }

    // Tick
    if (data.tick) {
        const symbol = data.tick.symbol;
        const price = data.tick.quote;
        if (marketData[symbol]) {
            marketData[symbol].push(price);
            if (marketData[symbol].length > 200) {
                marketData[symbol].shift();
            }
        }
        updateLivePrice(symbol, price);
    }

    // Ticks history
    if (data.ticks_history && data.ticks) {
        const symbol = data.ticks_history;
        const ticks = data.ticks.map(t => t.quote);
        marketData[symbol] = ticks;
        updateMarketChip(symbol);
    }

    // Trade response
    if (data.proposal) {
        console.log('✅ Trade proposal:', data.proposal);
        document.getElementById('tradeStatus').textContent = '✅ Trade placed!';
        alert('✅ Trade placed!\nPayout: ' + (data.proposal.payout || 'N/A'));
    }

    if (data.buy) {
        console.log('✅ Buy confirmed:', data.buy);
        document.getElementById('tradeStatus').textContent = '✅ Trade confirmed!';
        showMessage('✅ Trade confirmed! ID: ' + data.buy.contract_id);
    }

    // Errors
    if (data.error) {
        console.error('❌ API Error:', data.error);
        showMessage('❌ ' + data.error.message);
    }
}

// ============================================================
// DISPLAY ACCOUNTS
// ============================================================
function displayAccounts(accounts) {
    const demo = accounts.find(a => a.is_virtual);
    const real = accounts.find(a => !a.is_virtual);

    if (demo) {
        accountDetails.demo = demo;
        document.getElementById('demoId').textContent = 'ID: ' + demo.loginid;
        document.getElementById('demoCurrency').textContent = demo.currency || 'USD';
        // Subscribe to demo balance
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                balance: 1,
                subscribe: 1,
                accounts: [demo.loginid]
            }));
        }
    }

    if (real) {
        accountDetails.real = real;
        document.getElementById('realId').textContent = 'ID: ' + real.loginid;
        document.getElementById('realCurrency').textContent = real.currency || 'USD';
        // Subscribe to real balance
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({
                balance: 1,
                subscribe: 1,
                accounts: [real.loginid]
            }));
        }
    }

    // Unlock the app
    unlockApp();
    showMessage('✅ Account loaded successfully!');
}

// ============================================================
// UPDATE BALANCE
// ============================================================
function updateBalance(data) {
    const loginid = data.loginid;
    const balance = data.balance;
    const currency = data.currency;

    const isDemo = accountDetails.demo && accountDetails.demo.loginid === loginid;

    if (isDemo) {
        document.getElementById('demoAmount').textContent = balance.toFixed(2);
        document.getElementById('demoCurrency').textContent = currency;
        console.log('💰 Demo balance:', balance, currency);
    } else {
        document.getElementById('realAmount').textContent = balance.toFixed(2);
        document.getElementById('realCurrency').textContent = currency;
        console.log('💰 Real balance:', balance, currency);
    }
}

// ============================================================
// LOCK / UNLOCK APP
// ============================================================
function unlockApp() {
    loginOverlay.classList.add('hidden');
    appContent.classList.add('unlocked');
    userBar.style.display = 'flex';
    balanceSection.style.display = 'block';
    tradeSection.style.display = 'block';
    console.log('✅ App unlocked');
}

function lockApp() {
    loginOverlay.classList.remove('hidden');
    appContent.classList.remove('unlocked');
    userBar.style.display = 'none';
    balanceSection.style.display = 'none';
    tradeSection.style.display = 'none';
    console.log('🔒 App locked');
}

// ============================================================
// LOGOUT
// ============================================================
function logout() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('auth_code');
    accessToken = null;
    if (ws) ws.close();
    lockApp();
    updateStatus('Logged out', false);
    showMessage('🔒 Logged out');
}

// ============================================================
// UPDATE STATUS
// ============================================================
function updateStatus(text, connected) {
    statusText.textContent = text;
    statusDot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
}

function showMessage(text) {
    message.textContent = text;
    console.log('📢', text);
}

// ============================================================
// LIVE PRICE
// ============================================================
function updateLivePrice(symbol, price) {
    const selected = document.getElementById('marketSelect').value;
    if (symbol !== selected) return;

    document.getElementById('livePriceSection').style.display = 'block';
    document.getElementById('livePrice').textContent = price.toFixed(2);

    // Add to tick feed
    const feed = document.getElementById('tickFeed');
    const chip = document.createElement('span');
    chip.textContent = price.toFixed(2);
    chip.style.cssText = 'padding:2px 8px;background:rgba(155,89,182,0.15);border-radius:4px;font-family:monospace;font-size:0.8rem;';
    feed.prepend(chip);
    if (feed.children.length > 20) {
        feed.removeChild(feed.lastChild);
    }
}

// ============================================================
// SCAN ALL MARKETS
// ============================================================
function scanAllMarkets() {
    if (isScanning) return;
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        showMessage('❌ WebSocket not connected');
        return;
    }

    isScanning = true;
    document.getElementById('scanBtn').disabled = true;
    document.getElementById('scanBtn').textContent = 'SCANNING...';
    showMessage('🔄 Scanning all markets...');

    const symbols = ['R_10', 'R_25', 'R_50', 'R_75', 'R_100', '1HZ10V', '1HZ25V', '1HZ50V', '1HZ75V', '1HZ100V', 'JD10', 'JD25'];

    symbols.forEach(symbol => {
        marketData[symbol] = [];
        ws.send(JSON.stringify({
            ticks_history: symbol,
            adjust_limit: 1,
            end: 'latest',
            count: 200,
            style: 'ticks'
        }));
        ws.send(JSON.stringify({
            ticks: symbol,
            subscribe: 1
        }));
    });

    setTimeout(function() {
        isScanning = false;
        document.getElementById('scanBtn').disabled = false;
        document.getElementById('scanBtn').textContent = '✓ SCAN COMPLETE';
        showMessage('✅ Scan complete! All markets ready.');
    }, 5000);
}

// ============================================================
// UPDATE MARKET CHIP
// ============================================================
function updateMarketChip(symbol) {
    // Simple visual feedback
    const btn = document.getElementById('scanBtn');
    btn.textContent = '✓ ' + symbol + ' loaded';
    setTimeout(function() {
        btn.textContent = '✓ SCAN COMPLETE';
    }, 500);
}

// ============================================================
// PLACE TRADE
// ============================================================
function placeTrade(type) {
    if (!accessToken) {
        alert('Please login first');
        return;
    }

    const amount = parseFloat(document.getElementById('tradeAmount').value);
    const duration = parseFloat(document.getElementById('tradeDuration').value);
    const symbol = document.getElementById('marketSelect').value;

    if (!symbol) {
        alert('Please select a market');
        return;
    }

    if (isNaN(amount) || amount <= 0) {
        alert('Enter a valid amount');
        return;
    }

    if (isNaN(duration) || duration <= 0) {
        alert('Enter a valid duration');
        return;
    }

    // Find account ID (prefer real, fallback to demo)
    let loginid = null;
    if (accountDetails.real) {
        loginid = accountDetails.real.loginid;
    } else if (accountDetails.demo) {
        loginid = accountDetails.demo.loginid;
    }

    if (!loginid) {
        alert('No account found');
        return;
    }

    document.getElementById('tradeStatus').textContent = '⏳ Placing trade...';

    const contract = {
        proposal: 1,
        amount: amount,
        basis: 'stake',
        contract_type: type,
        currency: 'USD',
        duration: duration,
        duration_unit: 't',
        symbol: symbol,
        loginid: loginid
    };

    console.log('📊 Placing trade:', contract);
    ws.send(JSON.stringify(contract));
}

// ============================================================
// RESTORE SESSION
// ============================================================
function restoreSession() {
    const token = localStorage.getItem('access_token');
    if (token) {
        accessToken = token;
        connectWebSocket();
    } else {
        showMessage('🔐 Please login to continue');
    }
}

// ============================================================
// MARKET SELECT CHANGE
// ============================================================
document.getElementById('marketSelect').addEventListener('change', function() {
    const symbol = this.value;
    if (marketData[symbol] && marketData[symbol].length > 0) {
        const lastPrice = marketData[symbol][marketData[symbol].length - 1];
        updateLivePrice(symbol, lastPrice);
    }
});

// ============================================================
// INIT
// ============================================================
console.log('🚀 Ndebe Trade Pro starting...');
handleOAuthCallback();
restoreSession();
</script>
</body>
                </html>
