<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Authenticating...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0612 0%, #16082a 100%);
            color: #f0ecf5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            text-align: center;
            padding: 50px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(155, 89, 182, 0.2);
            border-top: 3px solid #9B59B6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 1.5rem;
            margin: 20px 0;
            letter-spacing: 1px;
            color: #f0ecf5;
        }
        p {
            color: #8870a8;
            font-size: 0.95rem;
        }
        .error {
            color: #ff3366;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="auth-container" id="authContainer">
        <div class="spinner"></div>
        <h2>🔐 Authenticating...</h2>
        <p>Please wait while we log you in</p>
        <div class="error" id="errorMessage"></div>
    </div>

    <script>
        (function() {
            // Get URL parameters
            const params = new URLSearchParams(window.location.search);
            const code = params.get('code');
            const state = params.get('state');
            const error = params.get('error');
            const errorDescription = params.get('error_description');

            // Get the base URL (your app's URL)
            const baseUrl = window.location.origin;

            // Handle error
            if (error) {
                document.getElementById('errorMessage').textContent = '❌ ' + (errorDescription || error);
                setTimeout(function() {
                    window.location.href = baseUrl + '?error=' + encodeURIComponent(error);
                }, 3000);
                return;
            }

            // Handle success - redirect back to main app with code
            if (code) {
                console.log('✅ Authorization code received, redirecting to app...');
                window.location.href = baseUrl + '/?code=' + encodeURIComponent(code) + '&state=' + encodeURIComponent(state || '');
            } else {
                // No code or error - go back home
                console.log('⚠️ No authorization code found, redirecting home...');
                window.location.href = baseUrl;
            }
        })();
    </script>
</body>
</html>
